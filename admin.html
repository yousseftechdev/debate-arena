<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate Arena – Admin</title>
    <link rel="shortcut icon" href="microphone-solid-full.svg" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- copied from index.html to keep the same look & feel -->
    <style>
        body {
            --sb-track-color: #18181b;
            --sb-thumb-color: #f59e0b;
            --sb-size: 8px;
        }

        body::-webkit-scrollbar {
            width: var(--sb-size)
        }

        body::-webkit-scrollbar-track {
            background: var(--sb-track-color);
            border-radius: 10px;
        }

        body::-webkit-scrollbar-thumb {
            background: var(--sb-thumb-color);
            border-radius: 10px;
            border: 1px solid #e2d11a;
        }

        @supports not selector(::-webkit-scrollbar) {
            body {
                scrollbar-color: var(--sb-thumb-color) var(--sb-track-color);
            }
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        .title-font {
            font-family: 'Bebas Neue', sans-serif;
        }

        .scroll-fade {
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }
    </style>
</head>

<body class="h-full bg-zinc-950 text-white overflow-auto">
    <!-- login screen -->
    <div id="login-section"
        class="min-h-screen flex items-center justify-center bg-zinc-950 text-white">
        <form id="login-form"
            class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 w-full max-w-sm space-y-5">
            <h2 class="text-2xl font-semibold text-amber-400 text-center">Admin Login</h2>
            <div>
                <label for="password" class="block text-zinc-400 text-sm mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:border-amber-500 transition-colors">
            </div>
            <button type="submit"
                class="w-full bg-amber-500 hover:bg-amber-400 text-zinc-950 font-semibold py-3 rounded-lg transition-all">Login</button>
            <p id="login-message" class="text-center text-sm hidden"></p>
        </form>
    </div>

    <!-- admin dashboard (hidden until login) -->
    <div id="admin-dashboard" class="hidden min-h-screen bg-zinc-950 text-white p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl title-font text-amber-400">Admin Dashboard</h1>
            <button id="logout-btn" class="text-sm text-amber-400 underline">Logout</button>
        </header>
        <p id="team-count" class="text-amber-400 mb-4"></p>
        <div id="teams-container"
            class="space-y-3 max-h-96 overflow-y-auto scroll-fade">
            <p class="text-zinc-500 text-center">Loading teams...</p>
        </div>
    </div>

    <script>
        // --- configuration ---
        const SUPABASE_URL = 'https://raqqbpznzgdaucweczeb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_V_9hetu63KPPq0p1vbnexQ_8_HQ-HE2';
        // hashed password only – original string has been removed
        const ADMIN_HASH = 'b855c9bbe88515c501376abb021ef105b6837e0b5bc29b480f85233cb139f241';

        let supabaseClient = null;
        let registeredTeams = [];
        const MAX_TEAMS = 16;

        async function hashString(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        function initSupabase() {
            return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        async function fetchTeams() {
            try {
                const { data, error } = await supabaseClient
                    .from('debate_registrations')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (error) throw error;
                registeredTeams = data || [];
                updateTeamCount();
            } catch (err) {
                console.error('Error fetching teams:', err);
            }
        }

        function updateTeamCount() {
            const countEl = document.getElementById('team-count');
            const spotsLeft = MAX_TEAMS - registeredTeams.length;
            if (spotsLeft <= 0) {
                countEl.textContent = '🔥 All 16 spots filled!';
            } else {
                countEl.textContent = `⚡ ${spotsLeft} of 16 spots remaining`;
            }
            renderTeamsList();
        }

        function renderTeamsList() {
            const container = document.getElementById('teams-container');
            if (registeredTeams.length === 0) {
                container.innerHTML =
                    '<p class="text-center text-zinc-500 py-8">No teams registered yet.</p>';
                return;
            }
            container.innerHTML = registeredTeams.map((team, index) => `
        <div class="bg-zinc-800/40 border border-zinc-700 rounded-lg p-4 flex items-start justify-between gap-4 hover:border-amber-500/50 transition-colors">
          <div class="flex-1">
            <h3 class="text-amber-400 font-semibold text-lg">${team.team_name}</h3>
            <div class="mt-2 space-y-1 text-sm text-zinc-400">
              <p>👥 ${team.member1}${team.member2 ? ', ' + team.member2 : ''}${team.member3 ? ', ' + team.member3 : ''}</p>
              <p>☎️ ${team.phone}</p>
            </div>
          </div>
          <div class="flex flex-col items-end gap-2">
            <span class="inline-block bg-amber-500/20 text-amber-400 text-xs font-semibold px-3 py-1 rounded-full">#${index + 1}</span>
            <div class="flex gap-2">
              <button data-id="${team.id}" class="edit-btn text-amber-400 text-xs hover:underline">Edit</button>
              <button data-id="${team.id}" class="delete-btn text-red-400 text-xs hover:underline">Delete</button>
            </div>
          </div>
        </div>
      `).join('');

            // attach delete handlers
            container.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Are you sure you want to delete this team?')) return;
                    await deleteTeam(btn.dataset.id);
                });
            });
            // attach edit handlers
            container.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const team = registeredTeams.find(t => t.id == id);
                    if (team) editTeam(team);
                });
            });
        }

        async function deleteTeam(id) {
            try {
                const { error } = await supabaseClient
                    .from('debate_registrations')
                    .delete()
                    .eq('id', id);
                if (error) throw error;
                showMessage('Team deleted successfully.', 'success', '#team-count');
                await fetchTeams();
            } catch (e) {
                console.error('Delete error:', e);
                showMessage('Failed to delete team.', 'error', '#team-count');
            }
        }

        // new helpers for editing
        async function updateTeam(id, data) {
            try {
                const { error } = await supabaseClient
                    .from('debate_registrations')
                    .update(data)
                    .eq('id', id);
                if (error) throw error;
                showMessage('Team updated successfully.', 'success', '#team-count');
                await fetchTeams();
            } catch (e) {
                console.error('Update error:', e);
                showMessage('Failed to update team.', 'error', '#team-count');
            }
        }

        async function editTeam(team) {
            const team_name = prompt('Team name:', team.team_name);
            if (team_name === null) return;
            const member1 = prompt('Member 1 (Captain):', team.member1);
            if (member1 === null) return;
            const member2 = prompt('Member 2:', team.member2);
            if (member2 === null) return;
            const member3 = prompt('Member 3:', team.member3);
            if (member3 === null) return;
            const phone = prompt('Phone:', team.phone);
            if (phone === null) return;

            await updateTeam(team.id, {
                team_name: team_name.trim(),
                member1: member1.trim(),
                member2: member2.trim(),
                member3: member3.trim(),
                phone: phone.trim()
            });
        }

        function showMessage(text, type, selector) {
            const el = document.querySelector(selector);
            if (!el) return;
            el.textContent = text;
            el.className = `text-center text-sm ${type === 'success' ? 'text-green-400' : 'text-red-400'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        function showDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            fetchTeams();
        }

        function logout() {
            localStorage.removeItem('admin_auth');
            location.reload();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const h = await hashString(pwd);
            if (h === ADMIN_HASH) {
                localStorage.setItem('admin_auth', 'true');
                showDashboard();
            } else {
                showMessage('Incorrect password', 'error', '#login-message');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', logout);

        (async () => {
            supabaseClient = initSupabase();
            // no plaintext password to hash
            if (localStorage.getItem('admin_auth') === 'true') {
                showDashboard();
            }
        })();
    </script>
</body>

</html>
